name: Media Analysis Workflow

on:
  schedule:
    # Запуск щодня о 09:00 за UTC
    - cron: '0 9 * * *'
  # Можливість запустити вручну з вкладки Actions
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-generativeai

      - name: Run media analysis script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python media_analysis.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # Додаємо результати аналізу та промпт
          git add *_media_analysis.txt prompt_w.txt
          git commit -m "Update media analysis report [skip ci]" || echo "No changes to commit"
          git push
