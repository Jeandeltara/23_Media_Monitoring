name: Automated News Monitoring System

on:
  schedule:
    - cron: '10 11 * * *'  # Каждый день в 11:10 UTC (14:10 по Киеву)
  workflow_dispatch:       # Кнопка ручного запуска для тестов

permissions:
  contents: write          # Права на запись файлов в репозиторий

jobs:
  monitor-job:
    runs-on: ubuntu-latest

    steps:
    - name: Проверяем код репозитория
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Настраиваем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем базовые библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil lxml

    - name: Сбор новостей (Парсер)
      run: python main.py

    - name: Синхронизация файлов с репозиторием GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Добавляем все отчеты, подходящие под новый формат имени (YYMMDD_hhmm_report.txt)
        git add *_report.txt
        
        # Коммитим и пушим только если появились новые файлы отчетов
        git diff --cached --quiet || (git commit -m "Автоматическое обновление архива отчетов [skip ci]" && git push origin main)
