name: Run Parser

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libnss3 \
          libatk-bridge2.0-0 \
          libdrm2 \
          libxkbcommon0 \
          libgbm1 \
          libasound2t64 \
          libxshmfence1 \
          libcurl4-openssl-dev
    
    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 lxml python-dateutil curl-cffi playwright requests
        playwright install chromium
    
    - name: Run parser
      run: python parser.py
    
    - name: Upload reports as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: |
          full_report.txt
          brief_report.txt
          error_report.txt
        retention-days: 30
    
    - name: Commit and push reports
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add full_report.txt brief_report.txt error_report.txt
        git diff --staged --quiet || git commit -m "Update reports [skip ci]"
        git push
    - name: Install curl_cffi with dependencies
      run: |
        pip install --upgrade pip
        pip install curl_cffi --no-cache-dir --force-reinstall
        pip install beautifulsoup4 lxml python-dateutil playwright requests
    - name: Install dependencies
      run: |
          python -m pip install --upgrade pip
          pip install feedparser python-dateutil requests beautifulsoup4
