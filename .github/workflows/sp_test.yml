name: Test Suspilne Limits

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install curl_cffi beautifulsoup4 lxml pandas matplotlib ipython
    
    - name: Run test
      run: python test_suspilne_limits.py
