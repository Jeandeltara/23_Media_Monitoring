name: Save Suspilne Content

on:
  workflow_dispatch:

jobs:
  save-content:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install curl_cffi beautifulsoup4 lxml
    
    - name: Run script
      run: python save_suspilne.py
    
    - name: Upload content
      uses: actions/upload-artifact@v4
      with:
        name: suspilne-content
        path: |
          suspilne_content.txt
          suspilne_full_page.html
          suspilne_error_response.html
        retention-days: 7
